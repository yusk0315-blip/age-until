<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0f172a">
  <title>オフライン</title>
  <style>
    body{font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;margin:0;padding:24px;background:#f3f5f9;color:#0f172a}
    .card{max-width:680px;margin:0 auto;background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
    h1{font-size:18px;margin:0 0 10px}
    p{margin:0 0 10px;line-height:1.6;color:#475569}
    a{color:#0ea5e9;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h1>オフラインです</h1>
    <p>ネットに繋がったら、もう一度開いてください。</p>
    <p>（一度読み込みに成功していれば、キャッシュで動く場合があります）</p>
    <p><a href="./">トップに戻る</a></p>
  </div>
</body>
</html>
